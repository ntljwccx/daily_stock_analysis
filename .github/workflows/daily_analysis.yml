name: Daily Stock Analysis

on:
  schedule:
    - cron: '15 1 * * 1-5'    # 北京时间 9:15 (UTC 1:15) - 盘前分析
    - cron: '5 7 * * 1-5'     # 北京时间 15:05 (UTC 7:05) - 盘后复盘
  workflow_dispatch:          # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))  # 随机延迟0-60秒启动
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行个股分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: python main.py

  market-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行大盘复盘
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python main.py --market-review
